<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ NAME }} — Resume</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 11pt;
  line-height: 1.6;
  color: #222;
  background: #fafafa;
  padding: 0;
}
.resume {
  max-width: 850px;
  margin: 0 auto;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.12);
}
.header {
  background: #fff;
  border-bottom: 3px double #222;
  padding: 28px 45px 18px;
  text-align: center;
}
.header h1 {
  font-size: 26pt;
  font-weight: 700;
  color: #111;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}
.header .title {
  font-size: 13pt;
  font-weight: 400;
  font-style: italic;
  color: #444;
  margin-bottom: 10px;
}
.header .contact {
  font-size: 10pt;
  color: #555;
  font-family: 'Calibri', Arial, sans-serif;
}
.header .contact a {
  color: #0645ad;
  text-decoration: none;
}
.section {
  padding: 18px 45px;
}
.section + .section {
  border-top: 1px solid #ddd;
}
.section h2 {
  font-size: 13pt;
  font-weight: 700;
  color: #111;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  margin-bottom: 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid #111;
}
.summary-text {
  font-size: 10.5pt;
  line-height: 1.65;
  color: #333;
}
.skills-grid { display: flex; flex-wrap: wrap; gap: 5px; }
.skill-tag {
  background: #e8e8e8;
  color: #111;
  padding: 3px 10px;
  border-radius: 0;
  font-size: 9.5pt;
  border: 1px solid #bbb;
  font-family: 'Calibri', Arial, sans-serif;
}
.skill-category { margin-bottom: 10px; }
.skill-category .cat-name {
  font-weight: 700;
  font-size: 10.5pt;
  color: #111;
  margin-bottom: 4px;
  font-style: italic;
}
.project { margin-bottom: 22px; }
.project:last-child { margin-bottom: 0; }
.project .company {
  font-size: 12pt;
  font-weight: 700;
  color: #111;
}
.project .role {
  font-size: 11pt;
  font-style: italic;
  color: #333;
}
.project .dates {
  font-size: 9.5pt;
  color: #555;
  margin-bottom: 6px;
  font-family: 'Calibri', Arial, sans-serif;
}
.project .details h3 {
  font-size: 10.5pt;
  font-weight: 700;
  color: #111;
  margin-top: 8px;
  margin-bottom: 4px;
}
.project .details ul {
  list-style: disc;
  padding-left: 22px;
}
.project .details ul li {
  margin-bottom: 3px;
  font-size: 10pt;
}
.project .techs {
  font-size: 9.5pt;
  color: #333;
  margin-top: 6px;
  font-family: 'Calibri', Arial, sans-serif;
}
.project .techs strong { color: #111; }
</style>
</head>
<body>
<div class="resume">
  <div class="header">
    <h1>{{ NAME }}</h1>
    <div class="title">{{ PROFESSION }}</div>
    <div class="contact">{{ CONTACTS }}</div>
  </div>

  <div class="section">
    <h2>Professional Summary</h2>
    <p class="summary-text">{{ SUMMARY }}</p>
  </div>

  {{ SKILLS_SECTION }}

  <div class="section">
    <h2>Professional Experience</h2>
    {{ PROJECTS }}
  </div>

  {{ EDUCATION_SECTION }}
</div>
</body>
</html>
