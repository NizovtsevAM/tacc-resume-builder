<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ NAME }} — Resume</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
  font-size: 11pt;
  line-height: 1.5;
  color: #2c3e50;
  background: #f5f6fa;
  padding: 40px 20px;
}
.resume {
  max-width: 850px;
  margin: 0 auto;
  background: #fff;
  box-shadow: 0 2px 20px rgba(0,0,0,0.1);
  border-radius: 8px;
  overflow: hidden;
}
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  color: #fff;
  padding: 35px 40px 25px;
  text-align: center;
}
.header h1 {
  font-size: 28pt;
  font-weight: 700;
  letter-spacing: 1px;
  margin-bottom: 4px;
}
.header .title {
  font-size: 14pt;
  font-weight: 300;
  color: #a8b2d1;
  margin-bottom: 8px;
}
.header .contact {
  font-size: 9.5pt;
  color: #8892b0;
}
.header .contact span { margin: 0 8px; }
.section { padding: 20px 40px; }
.section + .section { border-top: 1px solid #e8e8e8; }
.section h2 {
  font-size: 13pt;
  font-weight: 700;
  color: #1a1a2e;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 2px solid #1a1a2e;
}
.summary-text {
  font-size: 10.5pt;
  line-height: 1.6;
  color: #555;
}
.skills-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.skill-tag {
  background: #eef0f5;
  color: #1a1a2e;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 9.5pt;
}
.skill-category { margin-bottom: 10px; }
.skill-category .cat-name {
  font-weight: 600;
  font-size: 10pt;
  color: #1a1a2e;
  margin-bottom: 4px;
}
.project { margin-bottom: 24px; }
.project:last-child { margin-bottom: 0; }
.project .company {
  font-size: 12pt;
  font-weight: 700;
  color: #1a1a2e;
}
.project .role {
  font-size: 10.5pt;
  font-style: italic;
  color: #2c3e50;
}
.project .dates {
  font-size: 9pt;
  color: #7f8c8d;
  margin-bottom: 8px;
}
.project .details h3 {
  font-size: 10pt;
  font-weight: 600;
  color: #1a1a2e;
  margin-top: 8px;
  margin-bottom: 4px;
}
.project .details ul {
  list-style: none;
  padding-left: 0;
}
.project .details ul li {
  position: relative;
  padding-left: 16px;
  margin-bottom: 3px;
  font-size: 10pt;
}
.project .details ul li::before {
  content: "•";
  position: absolute;
  left: 0;
  color: #1a1a2e;
  font-weight: bold;
}
.project .techs {
  font-size: 9.5pt;
  color: #34495e;
  margin-top: 6px;
}
.project .techs strong { color: #1a1a2e; }
</style>
</head>
<body>
<div class="resume">
  <div class="header">
    <h1>{{ NAME }}</h1>
    <div class="title">{{ PROFESSION }}</div>
    <div class="contact">{{ CONTACTS }}</div>
  </div>

  <div class="section">
    <h2>Professional Summary</h2>
    <p class="summary-text">{{ SUMMARY }}</p>
  </div>

  {{ SKILLS_SECTION }}

  <div class="section">
    <h2>Professional Experience</h2>
    {{ PROJECTS }}
  </div>

  {{ EDUCATION_SECTION }}
</div>
</body>
</html>
