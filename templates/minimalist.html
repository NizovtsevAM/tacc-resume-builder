<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ NAME }} — Resume</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Calibri', 'Segoe UI', Arial, sans-serif;
  font-size: 11pt;
  line-height: 1.5;
  color: #222;
  background: #fff;
  padding: 40px 30px;
}
.resume {
  max-width: 800px;
  margin: 0 auto;
}
.header {
  border-bottom: 1px solid #ccc;
  padding-bottom: 10px;
  margin-bottom: 20px;
}
.header h1 {
  font-size: 22pt;
  font-weight: 700;
  color: #000;
  margin-bottom: 2px;
}
.header .title {
  font-size: 12pt;
  color: #444;
  margin-bottom: 6px;
}
.header .contact {
  font-size: 10pt;
  color: #555;
}
.header .contact a {
  color: #0645ad;
  text-decoration: none;
}
.section {
  margin-bottom: 18px;
}
.section h2 {
  font-size: 12pt;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid #aaa;
  padding-bottom: 3px;
  margin-bottom: 8px;
  color: #000;
}
.summary-text {
  font-size: 10.5pt;
  line-height: 1.55;
  color: #333;
}
.skills-grid { display: flex; flex-wrap: wrap; gap: 4px; }
.skill-tag {
  background: #eee;
  color: #000;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 9.5pt;
}
.skill-category { margin-bottom: 6px; }
.skill-category .cat-name {
  font-weight: 700;
  font-size: 10pt;
  color: #000;
  margin-bottom: 2px;
}
.project { margin-bottom: 16px; }
.project:last-child { margin-bottom: 0; }
.project .company {
  font-size: 11.5pt;
  font-weight: 700;
  color: #000;
}
.project .role {
  font-size: 10.5pt;
  font-style: italic;
  color: #333;
}
.project .dates {
  font-size: 9.5pt;
  color: #555;
  margin-bottom: 4px;
}
.project .details h3 {
  font-size: 10pt;
  font-weight: 700;
  color: #000;
  margin-top: 6px;
  margin-bottom: 2px;
}
.project .details ul {
  list-style: square;
  padding-left: 18px;
}
.project .details ul li {
  margin-bottom: 2px;
  font-size: 10pt;
}
.project .techs {
  font-size: 9.5pt;
  color: #333;
  margin-top: 4px;
}
.project .techs strong { color: #000; }
</style>
</head>
<body>
<div class="resume">
  <div class="header">
    <h1>{{ NAME }}</h1>
    <div class="title">{{ PROFESSION }}</div>
    <div class="contact">{{ CONTACTS }}</div>
  </div>

  <div class="section">
    <h2>Professional Summary</h2>
    <p class="summary-text">{{ SUMMARY }}</p>
  </div>

  {{ SKILLS_SECTION }}

  <div class="section">
    <h2>Professional Experience</h2>
    {{ PROJECTS }}
  </div>

  {{ EDUCATION_SECTION }}
</div>
</body>
</html>
