<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ NAME }} — Resume</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  font-size: 11pt;
  line-height: 1.55;
  color: #2b2d42;
  background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
  padding: 35px 20px;
}
.resume {
  max-width: 860px;
  margin: 0 auto;
  background: #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.12);
  border-radius: 6px;
  overflow: hidden;
}
.header {
  background: linear-gradient(135deg, #2b2d42 0%, #1a1b2e 100%);
  color: #fff;
  padding: 40px 45px 28px;
  position: relative;
}
.header::after {
  content: "";
  position: absolute;
  bottom: -18px;
  left: 45px;
  width: 80px;
  height: 4px;
  background: #ef476f;
}
.header h1 {
  font-size: 30pt;
  font-weight: 800;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.header .title {
  font-size: 14pt;
  font-weight: 400;
  color: #a8dadc;
  margin-bottom: 12px;
}
.header .contact {
  font-size: 9.5pt;
  color: #c8d6e5;
  line-height: 1.7;
}
.header .contact a {
  color: #ffd166;
  text-decoration: none;
}
.section {
  padding: 22px 45px;
}
.section + .section {
  border-top: 1px solid #ececec;
}
.section h2 {
  font-size: 12pt;
  font-weight: 800;
  color: #1a1b2e;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 2px solid #ef476f;
  display: inline-block;
}
.summary-text {
  font-size: 10.5pt;
  line-height: 1.7;
  color: #3d405b;
}
.skills-grid { display: flex; flex-wrap: wrap; gap: 7px; }
.skill-tag {
  background: linear-gradient(135deg, #2b2d42 0%, #1a1b2e 100%);
  color: #fff;
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 9.5pt;
  font-weight: 500;
}
.skill-category { margin-bottom: 10px; }
.skill-category .cat-name {
  font-weight: 700;
  font-size: 10pt;
  color: #1a1b2e;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.project { margin-bottom: 22px; padding-left: 14px; border-left: 3px solid #ef476f; }
.project:last-child { margin-bottom: 0; }
.project .company {
  font-size: 12.5pt;
  font-weight: 800;
  color: #1a1b2e;
  margin-bottom: 3px;
}
.project .role {
  font-size: 10.5pt;
  font-weight: 500;
  color: #ef476f;
  margin-bottom: 4px;
}
.project .dates {
  font-size: 9pt;
  color: #6c757d;
  margin-bottom: 8px;
  font-family: 'SF Mono', 'Consolas', monospace;
}
.project .details h3 {
  font-size: 10pt;
  font-weight: 700;
  color: #2b2d42;
  margin-top: 8px;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.project .details ul {
  list-style: none;
  padding-left: 0;
}
.project .details ul li {
  position: relative;
  padding-left: 18px;
  margin-bottom: 4px;
  font-size: 10pt;
  color: #3d405b;
}
.project .details ul li::before {
  content: "▹";
  position: absolute;
  left: 0;
  color: #ef476f;
  font-weight: bold;
}
.project .techs {
  font-size: 9.5pt;
  color: #4a4e69;
  margin-top: 8px;
  font-family: 'SF Mono', 'Consolas', monospace;
}
.project .techs strong { color: #1a1b2e; }
</style>
</head>
<body>
<div class="resume">
  <div class="header">
    <h1>{{ NAME }}</h1>
    <div class="title">{{ PROFESSION }}</div>
    <div class="contact">{{ CONTACTS }}</div>
  </div>

  <div class="section">
    <h2>Professional Summary</h2>
    <p class="summary-text">{{ SUMMARY }}</p>
  </div>

  {{ SKILLS_SECTION }}

  <div class="section">
    <h2>Professional Experience</h2>
    {{ PROJECTS }}
  </div>

  {{ EDUCATION_SECTION }}
</div>
</body>
</html>
